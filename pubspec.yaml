name: marcelly_franca_personal
description: App premium de personal training - Marcelly França Personal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  cached_network_image: ^3.4.1
  http: 1.5.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.8.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  table_calendar: ^3.1.2
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0+3
  image_picker: ^1.1.2
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

